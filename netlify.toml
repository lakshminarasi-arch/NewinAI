# Static site — nothing to build. Netlify just serves the repo root.
[build]
  publish = "."
  command = ""
  # Build ONLY when the deployed site assets change. The live site is exactly
  # index.html + styles.css + app.js (cards.json is fetched from GitHub at runtime),
  # so commits to the pipeline, scripts, data, or docs never need a rebuild.
  # Exit 0 = skip the build; non-zero = build. This keeps cron + pipeline edits free.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- index.html styles.css app.js"

# cards.json is rewritten by the cron job; don't let the CDN serve a stale copy.
[[headers]]
  for = "/cards.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
