# Static site — nothing to build. Netlify just serves the repo root.
[build]
  publish = "."
  command = ""
  # Build ONLY when the deployed site assets change (index.html / styles.css / app.js);
  # cards.json is fetched from GitHub at runtime, so cron + pipeline commits never need
  # a rebuild. Compare against the PARENT commit (not $CACHED_COMMIT_REF) — the parent
  # is reliably present in Netlify's shallow clone, and if git errors this exits non-zero
  # (= build), failing safe. Exit 0 = skip. Caveat: if a data commit lands on top of an
  # asset commit before Netlify builds, push an empty asset touch to force the deploy.
  ignore = "git diff --quiet HEAD~1 HEAD -- index.html styles.css app.js"

# cards.json is rewritten by the cron job; don't let the CDN serve a stale copy.
[[headers]]
  for = "/cards.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
